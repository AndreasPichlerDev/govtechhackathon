name: Build and Deploy Frontend

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Frontend (prod)
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Bump version
        working-directory: frontend
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase
          npm version patch -m "bump version to %s"
          git push --follow-tags

      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        env:
          NODE_VERSION: "22.13.0"
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PURPLE_COAST_0A60EF803 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend"
          api_location: ""
          output_location: "dist/frontend/browser"
          app_build_command: "npm run build -- --configuration=production"
